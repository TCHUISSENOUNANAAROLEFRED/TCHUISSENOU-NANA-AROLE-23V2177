<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANTÉ UY1 - Portail Médical</title>
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: rgba(30, 30, 30, 0.85); /* Rendu transparent pour le glassmorphism */
            --primary-green: #2ecc71;
            --text-gray: #b3b3b3;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* AJOUT : Image de fond médicale/universitaire */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1576091160550-2173dbc9982a?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--white);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px; /* Un peu plus étroit pour un look mobile-first */
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            backdrop-filter: blur(15px); /* Effet de flou sur le fond */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        /* Stepper amélioré */
        .stepper {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }

        .step-item {
            text-align: center;
            flex: 1;
            position: relative;
        }

        .step-number {
            width: 30px;
            height: 30px;
            background: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 5px;
            font-size: 14px;
            font-weight: bold;
            color: var(--text-gray);
            transition: 0.4s;
        }

        .step-item.active .step-number {
            background: var(--primary-green);
            color: black;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }

        .step-item.completed .step-number {
            background: #1a5c35;
            color: var(--white);
        }

        .step-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-gray); }

        /* Formulaire */
        .form-step { display: none; }
        .form-step.active { display: block; animation: slideIn 0.4s ease-out; }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateX(20px); } 
            to { opacity: 1; transform: translateX(0); } 
        }

        h2 { font-size: 22px; margin-bottom: 25px; color: var(--primary-green); text-align: center;}
        
        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; color: var(--text-gray); font-size: 13px; font-weight: 500; }
        
        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--primary-green); background: rgba(255,255,255,0.1); }

        .btn-nav {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            font-size: 15px;
        }
        .btn-next { background: var(--primary-green); color: #000; }
        .btn-next:hover { background: #27ae60; transform: translateY(-2px); }
        .btn-prev { background: transparent; color: var(--text-gray); border: 1px solid rgba(255,255,255,0.2); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="stepper">
        <div class="step-item active" id="s1"><div class="step-number">1</div><div class="step-label">ID</div></div>
        <div class="step-item" id="s2"><div class="step-number">2</div><div class="step-label">Cursus</div></div>
        <div class="step-item" id="s3"><div class="step-number">3</div><div class="step-label">Santé</div></div>
        <div class="step-item" id="s4"><div class="step-number">4</div><div class="step-label">Aide</div></div>
    </div>

    <form id="medicalForm">
        <div class="form-step active" id="step1">
            <h2>👤 Identité</h2>
            <div class="input-group"><label>Nom Complet</label><input type="text" placeholder="Ex: Nana Arole Fred"></div>
            <div class="grid">
                <div class="input-group"><label>Matricule</label><input type="text" maxlength="7" placeholder="23V2177"></div>
                <div class="input-group"><label>Téléphone</label><input type="tel" placeholder="656641731"></div>
            </div>
            <button type="button" class="btn-nav btn-next" onclick="move(1, 2)">Suivant →</button>
        </div>

        <div class="form-step" id="step2">
            <h2>🎓 Cursus</h2>
            <div class="input-group">
                <label>Faculté / École</label>
                <select>
                    <option>Faculté des Sciences</option>
                    <option>Polytechnique</option>
                    <option>IUT</option>
                </select>
            </div>
            <div class="input-group"><label>Filière</label><input type="text" placeholder="Informatique"></div>
            <div class="grid">
                <button type="button" class="btn-nav btn-prev" onclick="move(2, 1)">Retour</button>
                <button type="button" class="btn-nav btn-next" onclick="move(2, 3)">Suivant</button>
            </div>
        </div>

        <div class="form-step" id="step3">
            <h2>🩺 Santé</h2>
            <div class="grid">
                <div class="input-group"><label>Groupe</label><select><option>O+</option><option>A+</option></select></div>
                <div class="input-group"><label>Temp (°C)</label><input type="number" step="0.1" placeholder="37.0"></div>
            </div>
            <div class="grid">
                <button type="button" class="btn-nav btn-prev" onclick="move(3, 2)">Retour</button>
                <button type="button" class="btn-nav btn-next" onclick="move(3, 4)">Suivant</button>
            </div>
        </div>

        <div class="form-step" id="step4">
            <h2>🚨 Urgence</h2>
            <div class="input-group"><label>Nom du parent</label><input type="text" placeholder="Nom complet"></div>
            <div class="input-group"><label>Téléphone urgence</label><input type="tel" placeholder="Numéro"></div>
            <div class="grid">
                <button type="button" class="btn-nav btn-prev" onclick="move(4, 3)">Retour</button>
                <button type="submit" class="btn-nav btn-next">Terminer ✅</button>
            </div>
        </div>
    </form>
</div>

<script>
    function move(current, next) {
        // 1. Masquer l'étape actuelle et afficher la suivante
        document.getElementById('step' + current).classList.remove('active');
        document.getElementById('step' + next).classList.add('active');
        
        // 2. Gérer visuellement le stepper (les petits ronds)
    const allSteps = document.querySelectorAll('.step-item');
        allSteps.forEach((step, index) => {
            const stepNum = index + 1;
            if (stepNum === next) {
                step.classList.add('active');
                step.classList.remove('completed');
            } else if (stepNum < next) {
                step.classList.add('completed');
                step.classList.remove('active');
            } else {
                step.classList.remove('active', 'completed');
            }
        });
    }
</script>

</body>
</html>
