<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Médical - UY1</title>
    <style>
        :root {
            --primary-blue: #2c3e50;
            --medical-blue: #3498db;
            --light-bg: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--light-bg);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .form-container {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 8px solid var(--medical-blue);
        }

        /* Barre de progression */
        .progress-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .step-indicator {
            width: 45%;
            height: 8px;
            background: #eee;
            border-radius: 10px;
        }

        .step-indicator.active { background: var(--medical-blue); }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 20px; color: var(--primary-blue); }

        .step { display: none; } /* On cache les étapes par défaut */
        .step.active { display: block; } /* On affiche l'étape active */

        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 14px; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn-container { display: flex; gap: 10px; margin-top: 20px; }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-next, .btn-submit { background: var(--medical-blue); color: white; }
        .btn-prev { background: #bdc3c7; color: white; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <h1>🩺 Dossier Médical Étudiant</h1>
        <p>Université de Yaoundé I</p>
    </div>

    <div class="progress-bar">
        <div class="step-indicator active" id="ind1"></div>
        <div class="step-indicator" id="ind2"></div>
    </div>

    <form id="multiStepForm">
        <div class="step active" id="step1">
            <h2 style="font-size: 16px; color: var(--medical-blue);">Phase 1 : Identification</h2>
            <div class="input-group">
                <label>Nom complet</label>
                <input type="text" placeholder="Ex: Fred Arole" required>
            </div>
            <div class="input-group">
                <label>Matricule (7 car. max)</label>
                <input type="text" maxlength="7" placeholder="Ex: 22A1234" required>
            </div>
            <div class="input-group">
                <label>Email Universitaire</label>
                <input type="email" placeholder="etudiant@uy1.cm" required>
            </div>
            <div class="btn-container">
                <button type="button" class="btn-next" onclick="nextStep()">Suivant ➡️</button>
            </div>
        </div>

        <div class="step" id="step2">
            <h2 style="font-size: 16px; color: var(--medical-blue);">Phase 2 : Données Médicales</h2>
            <div class="input-group">
                <label>Groupe Sanguin</label>
                <select required>
                    <option value="">Choisir...</option>
                    <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                    <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
                </select>
            </div>
            <div class="input-group">
                <label>Température (°C)</label>
                <input type="number" step="0.1" placeholder="37.0">
            </div>
            <div class="input-group">
                <label>Tension Artérielle</label>
                <input type="text" placeholder="Ex: 12/8">
            </div>
            <div class="btn-container">
                <button type="button" class="btn-prev" onclick="prevStep()">⬅️ Retour</button>
                <button type="submit" class="btn-submit">Enregistrer ✅</button>
            </div>
        </div>
    </form>
</div>

<script>
    function nextStep() {
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        document.getElementById('ind2').classList.add('active');
    }

    function prevStep() {
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step1').classList.add('active');
        document.getElementById('ind2').classList.remove('active');
    }

    document.getElementById('multiStepForm').onsubmit = function(e) {
        e.preventDefault();
        alert('Données enregistrées avec succès pour l\'Université de Yaoundé I !');
    };
</script>

</body>
</html>
